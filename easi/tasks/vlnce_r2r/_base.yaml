display_name: "VLN-CE R2R"
description: "Vision-Language Navigation in Continuous Environments (Room-to-Room)"
simulator: "habitat_sim:v0_1_7"
task_class: "easi.tasks.vlnce_r2r.task.VLNCETask"
max_steps: 500

dataset:
  source: huggingface
  repo_id: "oscarqjh/VLN-CE-R2R_easi"
  subset: null
  hf_data_dir: "data"
  zip_files:
    - "mp3d_scenes.zip"

simulator_configs:
  render_platform: auto
  screen_height: 480
  screen_width: 480
  hfov: 90
  sensor_height: 1.25
  gpu_device_id: -1
  success_distance: 3.0
  forward_step_size: 0.25
  turn_angle: 15
  allow_sliding: true
  additional_deps:
    - "fastdtw>=0.3.4"

agent:
  prompt_builder: "easi.tasks.vlnce_r2r.prompts.VLNCEPromptBuilder"
  prompt_builder_kwargs:
    use_feedback: true
    use_geo_distance: true
    action_history_len: 20
    chat_history: false
    message_window_len: 5
  generation_kwargs:
    temperature: 0
    max_tokens: 4096
    top_p: 0.95
