name: ebhabitat_complex_instruction
display_name: "EB-Habitat Complex Instruction Split"
description: "Complex instruction evaluation split for EB-Habitat (rearrangement)"
simulator: "habitat_sim:v0_3_0"
task_class: "easi.tasks.ebhabitat.task.EBHabitatTask"
max_steps: 30
dataset:
  source: huggingface
  repo_id: "oscarqjh/EB-Habitat_easi"
  subset: null
  split: "complex_instruction"
  zip_files:
    - "simulator_data.zip"
    - "datasets.zip"
simulator_configs:
  screen_height: 500
  screen_width: 500
  max_invalid_actions: 10
  feedback_verbosity: 1
  gpu_device_id: -1
  additional_deps:
    - "gym"
    - "hydra-core>=1.3"
    - "omegaconf>=2.3"
    - "imageio"
    - "torch"
    - "habitat-lab @ git+https://github.com/facebookresearch/habitat-lab.git@v0.3.0#subdirectory=habitat-lab"
agent:
  prompt_builder: "easi.tasks.ebhabitat.prompts.EBHabitatPromptBuilder"
  prompt_builder_kwargs:
    n_shot: 10
    split: "complex_instruction"
    use_feedback: true
    chat_history: false
