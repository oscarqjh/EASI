name: ebalfred_base
display_name: "EB-Alfred Base Split"
description: "Base evaluation split for EB-Alfred"
simulator: "ai2thor:v2_1_0"
task_class: "easi.tasks.ebalfred.task.EBAlfredTask"
action_space: []
max_steps: 50
dataset:
  source: huggingface
  repo_id: "oscarqjh/EB-Alfred_easi"
  subset: null
  split: "base"
  zip_files:
    - "tasks.zip"
simulator_configs:
  quality: "MediumCloseFitShadows"
  screen_height: 500
  screen_width: 500
  additional_deps:
    - "gym"
    - "networkx"
    - "opencv-python"
agent:
  prompt_builder: "easi.tasks.ebalfred.prompts.EBAlfredPromptBuilder"
  prompt_builder_kwargs:
    n_shot: 10
    split: "base"
    use_feedback: true
