name: ebalfred_long_horizon
display_name: "EB-Alfred Long Horizon Split"
description: "Long-horizon evaluation split requiring multi-step planning"
simulator: "ai2thor:v2_1_0"
task_class: "easi.tasks.ebalfred.task.EBAlfredTask"
max_steps: 50
dataset:
  source: huggingface
  repo_id: "oscarqjh/EB-Alfred_easi"
  subset: null
  split: "long_horizon"
  zip_files:
    - "tasks.zip"
simulator_configs:
  quality: "MediumCloseFitShadows"
  screen_height: 500
  screen_width: 500
  max_invalid_actions: 10
  feedback_verbosity: 0
  detection_box: false
  additional_deps:
    - "gym"
    - "networkx"
    - "opencv-python"
agent:
  prompt_builder: "easi.tasks.ebalfred.prompts.EBAlfredPromptBuilder"
  prompt_builder_kwargs:
    n_shot: 7
    split: "long_horizon"
    use_feedback: true
    chat_history: true
  generation_kwargs:
    temperature: 0
    max_tokens: 2048
    top_k: 50
    top_p: 0.95
    do_sample: false
