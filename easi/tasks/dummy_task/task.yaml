name: dummy_task
display_name: "Dummy Navigation Task"
description: "A dummy task for testing the pipeline end-to-end"

# Pin to a specific versioned simulator
simulator: "dummy:v1"

# Action space available to the agent
action_space:
  - MoveAhead
  - TurnLeft
  - TurnRight
  - Stop

# Dataset source
dataset:
  source: "local"
  path: null  # null = use built-in dummy episodes

# Episode limits
max_steps: 100

# Task class to load
task_class: "easi.tasks.dummy_task.task.DummyTask"
