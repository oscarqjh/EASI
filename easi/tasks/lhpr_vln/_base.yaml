display_name: "LHPR-VLN"
description: "Long-Horizon Path Reasoning in Vision-Language Navigation (CVPR-25)"
simulator: "habitat_sim:v0_3_0"
task_class: "easi.tasks.lhpr_vln.task.LHPRVLNTask"
max_steps: 500
dataset:
  source: huggingface
  repo_id: "oscarqjh/LHPR-VLN_easi"
  subset: null
  hf_data_dir: "data"
  zip_files:
    - "hm3d_v0.2_lhpr_scenes.zip"
simulator_configs:
  render_platform: auto
  screen_height: 512
  screen_width: 512
  device: gpu
  success_distance: 1.0
  forward_step_size: 0.25
  turn_angle: 30
  sensors:
    rgb: [front, left, right]
    depth: []
    semantic: false
    third_person: false
  additional_deps: []
agent:
  fallback_strategy: reprompt         # "default_action" or "reprompt"
  fallback_action: move_forward       # last-resort action when all retries fail (one of: move_forward, turn_left, turn_right, stop)
  max_fallback_retries: 2             # only used by "reprompt" strategy: number of re-prompt attempts before giving up
  prompt_builder: "easi.tasks.lhpr_vln.prompts.LHPRVLNPromptBuilder"
  prompt_builder_kwargs:
    use_feedback: true
    use_geo_distance: true
    use_subtask_progress: true
    use_agent_position: false
    use_target_coordinate: false
    use_depth: false
    action_history_len: 20
    chat_history: false
    message_window_len: 5
  generation_kwargs:
    temperature: 0
    max_tokens: 4096
    top_p: 0.95
