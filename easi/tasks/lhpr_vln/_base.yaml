display_name: "LHPR-VLN"
description: "Long-Horizon Path Reasoning in Vision-Language Navigation (CVPR-25)"
simulator: "habitat_sim:v0_3_0"
task_class: "easi.tasks.lhpr_vln.task.LHPRVLNTask"
max_steps: 500
dataset:
  source: huggingface
  repo_id: "oscarqjh/LHPR-VLN_easi"
  subset: null
  hf_data_dir: "data"
  zip_files:
    - "hm3d_v0.2_lhpr_scenes.zip"
simulator_configs:
  render_platform: auto
  screen_height: 512
  screen_width: 512
  gpu_device_id: -1
  success_distance: 1.0
  additional_deps: []
agent:
  prompt_builder: "easi.tasks.lhpr_vln.prompts.LHPRVLNPromptBuilder"
  prompt_builder_kwargs:
    use_feedback: true              # Include action execution feedback in history
    use_geo_distance: true          # Show geodesic distance to current target
    use_subtask_progress: true      # Show subtask stage/total + current target name
    use_agent_position: false       # Show agent 3D position (x, y, z)
    use_target_coordinate: false    # Show target 3D coordinate (x, y, z)
    action_history_len: 20          # Action history entries: 0=off, -1=unlimited, N=last N
    chat_history: false             # Stateless (false) or accumulated messages (true)
    message_window_len: 5           # Sliding window for chat history mode
  generation_kwargs:
    temperature: 0
    max_tokens: 4096
    top_p: 0.95
